# This rule is not used by the project rbac-subtract itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over rbac.kim.karolinska.se.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: rbac-subtract
    app.kubernetes.io/managed-by: kustomize
  name: modifyclusterrole-admin-role
rules:
- apiGroups:
  - rbac.kim.karolinska.se
  resources:
  - modifyclusterroles
  verbs:
  - '*'
- apiGroups:
  - rbac.kim.karolinska.se
  resources:
  - modifyclusterroles/status
  verbs:
  - get
