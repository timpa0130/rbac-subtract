apiVersion: v1
kind: ServiceAccount
metadata:
  name: modifyclusterrole-controller
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: modifyclusterrole-controller
rules:
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterroles"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["kim.karolinska.se"]
  resources: ["modifyclusterroles"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: ["kim.karolinska.se"]
  resources: ["modifyclusterroles/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: modifyclusterrole-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: modifyclusterrole-controller
subjects:
- kind: ServiceAccount
  name: modifyclusterrole-controller
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modifyclusterrole-controller
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: modifyclusterrole-controller
  template:
    metadata:
      labels:
        app: modifyclusterrole-controller
    spec:
      serviceAccountName: modifyclusterrole-controller
      containers:
      - name: controller
        image: modifyclusterrole-controller:latest
        imagePullPolicy: IfNotPresent
